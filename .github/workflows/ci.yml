name: CI/CD Pipeline - Build & Push

# 1. The Trigger: When should this pipeline run?
on:
  push:
    branches:
      - main # Runs every time you push code to the 'main' branch

# 2. The Jobs: What server should run the tasks?
jobs:
  build-and-push:
    runs-on: ubuntu-latest # GitHub provides a free, temporary Linux server

    # 3. The Steps: What exactly should the server do?
    steps:
      - name: 📥 Check out the repository code
        uses: actions/checkout@v4

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and push the Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker-training # <--- This tells Docker to look inside your subfolder!
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-first-app:latest